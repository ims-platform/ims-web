name: Frontend CI

on:
  pull_request:
    branches: [develop, staging, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install || echo "No dependencies yet"

      - name: Lint
        run: npm run lint || echo "No lint configured"

      - name: Build
        run: npm run build || echo "No build yet"
